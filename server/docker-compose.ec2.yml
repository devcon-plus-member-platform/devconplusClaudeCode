# Staging slot — deployed from dev by deploy-backend-staging.yml.
# Normally pulls the CI-built image from GHCR; `build:` remains as the
# fallback path (docker compose build) if the registry is unreachable.
services:
  api:
    container_name: devcon-plus-api
    image: ghcr.io/devcon-plus-member-platform/devcon-plus-api:staging
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "127.0.0.1:8000:8000"
