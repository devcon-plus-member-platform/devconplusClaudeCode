name: Nightly Build Check

on:
  schedule:
    - cron: '0 20 * * *'  # 4:00 AM PHT (UTC+8) daily
  workflow_dispatch: {}

jobs:
  nightly-build:
    name: Nightly validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly build failed — ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## Nightly Build Failure',
                '',
                `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'The nightly build check detected a regression. This likely means a dependency update or drift has broken the build.',
                '',
                'cc @rocketwolf98',
              ].join('\n'),
              labels: ['bug', 'ci'],
            })
