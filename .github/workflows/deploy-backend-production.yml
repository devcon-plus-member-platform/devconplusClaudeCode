# Deploys the NestJS backend (server/) on master to the PRODUCTION slot of the
# EC2 host (container devcon-plus-api-prod, port 8010, https://api.devcon.ph).
#
# DORMANT until the dev -> master structural merge: master has no server/
# folder yet, so the preflight guard skips every run cleanly. After the merge,
# deploys additionally require:
#   - the prod slot provisioned on EC2 (/opt/devcon-plus/prod-repo + .env.prod)
#   - api.devcon.ph DNS + certbot + nginx block (see merge-day runbook)
#   - a reviewer approval via the GitHub "production" environment
#
# Same architecture as the staging workflow: tests gate -> image built in CI,
# pushed to GHCR (:prod tags) -> EC2 pulls via SSM. OIDC trust already covers
# refs/heads/master (infra/github-oidc.tf).
name: Deploy backend (production)

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend-production.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/rocketwolf98/devcon-plus-api

jobs:
  # master keeps the old repo layout (no server/) until the structural merge.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has-server: ${{ steps.detect.outputs.has-server }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: echo "has-server=$([ -d server ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  test:
    needs: preflight
    if: needs.preflight.outputs.has-server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  build-image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build server -t "$IMAGE:prod" -t "$IMAGE:prod-$SHORT_SHA"
          docker push "$IMAGE:prod"
          docker push "$IMAGE:prod-$SHORT_SHA"
          echo "Pushed $IMAGE:prod and :prod-$SHORT_SHA" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build-image
    # Pauses for manual approval once a required reviewer is configured on the
    # "production" environment (GitHub repo Settings -> Environments).
    environment: production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ap-southeast-1
      INSTANCE_ID: i-02e08aceb6d701d77
      HEALTH_URL: https://api.devcon.ph/api/health
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::484907520476:role/devcon-plus-api-github-deploy
          aws-region: ap-southeast-1

      - name: Deploy on EC2 via SSM
        run: |
          set -euo pipefail

          SCRIPT=$(cat <<EOF
          set -euo pipefail
          if [ ! -d /opt/devcon-plus/prod-repo ]; then
            echo "Production slot not provisioned on this host - follow the merge-day runbook (clone master to /opt/devcon-plus/prod-repo and create server/.env.prod) before deploying."
            exit 1
          fi
          sudo -u ec2-user git -C /opt/devcon-plus/prod-repo fetch origin master
          sudo -u ec2-user git -C /opt/devcon-plus/prod-repo reset --hard FETCH_HEAD
          cd /opt/devcon-plus/prod-repo/server
          docker compose -f docker-compose.prod.yml pull || docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d
          docker image prune -f
          sleep 10
          curl -fsS --retry 5 --retry-delay 5 --retry-connrefused http://127.0.0.1:8010/api/health
          EOF
          )

          PARAMS=$(jq -n --arg s "$SCRIPT" \
            '{commands: ($s | split("\n")), executionTimeout: ["600"]}')

          CMD_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"

          STATUS=InProgress
          for _ in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text)
            case "$STATUS" in
              InProgress|Pending|Delayed) sleep 10 ;;
              *) break ;;
            esac
          done

          echo "=== status: $STATUS ==="
          echo "=== stdout ==="
          aws ssm get-command-invocation --region "$AWS_REGION" \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          echo "=== stderr ==="
          aws ssm get-command-invocation --region "$AWS_REGION" \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text

          test "$STATUS" = "Success"

      - name: Smoke test public endpoint
        run: curl --fail --silent --show-error --retry 3 --retry-delay 5 "$HEALTH_URL"
