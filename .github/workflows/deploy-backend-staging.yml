# Deploys the NestJS backend (server/) on dev to the staging slot of the EC2
# host (container devcon-plus-api, port 8000, https://api.devcon.plus).
#
# Flow: tests gate -> Docker image built in CI and pushed to GHCR -> EC2 pulls
# the image via SSM and restarts the container. Building in CI keeps the small
# instance from doing heavy compiles; `pull || build` falls back to an on-host
# build if GHCR is unavailable (e.g. before the package is made public).
#
# Auth: GitHub OIDC -> scoped IAM role (infra/github-oidc.tf), no stored AWS
# secrets. master deploys are handled by deploy-backend-production.yml.
name: Deploy backend (staging)

on:
  push:
    branches: [dev]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-staging
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/devcon-plus-member-platform/devcon-plus-api

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  build-image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build server -t "$IMAGE:staging" -t "$IMAGE:staging-$SHORT_SHA"
          docker push "$IMAGE:staging"
          docker push "$IMAGE:staging-$SHORT_SHA"
          echo "Pushed $IMAGE:staging and :staging-$SHORT_SHA" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ap-southeast-1
      INSTANCE_ID: i-02e08aceb6d701d77
      HEALTH_URL: https://api.devcon.plus/api/health
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # The role ARN is an identifier, not a secret — access is gated by
          # the role's trust policy (this repo, dev/master refs only).
          role-to-assume: arn:aws:iam::484907520476:role/devcon-plus-api-github-deploy
          aws-region: ap-southeast-1

      - name: Deploy on EC2 via SSM
        run: |
          set -euo pipefail

          # git runs as ec2-user (repo owner); running it as root fails with
          # "dubious ownership" and would silently deploy stale code.
          # Staging always deploys origin/dev regardless of how the workflow
          # was invoked.
          SCRIPT=$(cat <<EOF
          set -euo pipefail
          sudo -u ec2-user git -C /opt/devcon-plus/repo fetch origin dev
          sudo -u ec2-user git -C /opt/devcon-plus/repo reset --hard FETCH_HEAD
          cd /opt/devcon-plus/repo/server
          docker compose -f docker-compose.ec2.yml pull || docker compose -f docker-compose.ec2.yml build
          docker compose -f docker-compose.ec2.yml up -d
          docker image prune -f
          sleep 10
          curl -fsS --retry 5 --retry-delay 5 --retry-connrefused http://127.0.0.1:8000/api/health
          EOF
          )

          PARAMS=$(jq -n --arg s "$SCRIPT" \
            '{commands: ($s | split("\n")), executionTimeout: ["600"]}')

          CMD_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"

          # Custom poll loop: the built-in command-executed waiter caps at
          # ~100s, shorter than a worst-case fallback build.
          STATUS=InProgress
          for _ in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text)
            case "$STATUS" in
              InProgress|Pending|Delayed) sleep 10 ;;
              *) break ;;
            esac
          done

          echo "=== status: $STATUS ==="
          echo "=== stdout ==="
          aws ssm get-command-invocation --region "$AWS_REGION" \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          echo "=== stderr ==="
          aws ssm get-command-invocation --region "$AWS_REGION" \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text

          test "$STATUS" = "Success"

      - name: Smoke test public endpoint
        run: curl --fail --silent --show-error --retry 3 --retry-delay 5 "$HEALTH_URL"
